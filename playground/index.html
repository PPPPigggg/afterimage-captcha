<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Afterimage CAPTCHA</title>
</head>

<body>
  <main>
    <h1>Afterimage CAPTCHA</h1>

    <div class="layout">
      <section class="preview" aria-labelledby="preview-title">
        <h2 id="preview-title">预览 / Preview</h2>
        <canvas id="captcha" aria-label="动态验证码 / Animated CAPTCHA"></canvas>
        <p>状态 / Status：<output id="status" aria-live="polite">准备中 / Ready</output></p>
        <p>答案 / Answer：<output id="answer">-</output></p>
        <p>刷新率 / Refresh rate：<output id="refresh-rate">检测中 / Detecting</output></p>
        <p id="error" role="alert" hidden></p>
      </section>

      <section class="options" aria-labelledby="options-title">
        <h2 id="options-title">参数 / Options</h2>

        <form id="form">
          <fieldset>
            <legend>内容 / Content</legend>
            <p class="wide">
              <label for="text">文本 / Text</label>
              <input id="text" name="text" maxlength="32" autocomplete="off" />
            </p>
            <p>
              <label for="length">
                随机长度 / Length
                <output id="length-value" for="length">5</output>
              </label>
              <input id="length" name="length" type="range" min="1" max="12" value="5" />
            </p>
            <p class="wide">
              <label for="charset">候选字符 / Character set</label>
              <input id="charset" name="charset" maxlength="128" value="ABCDEFGHJKLMNPQRSTUVWXYZ23456789"
                autocomplete="off" />
            </p>
          </fieldset>

          <fieldset>
            <legend>画布与字符 / Canvas &amp; Characters</legend>
            <p>
              <label for="width">
                宽度 / Width
                <output id="width-value" for="width">220</output>
              </label>
              <input id="width" name="width" type="range" min="32" max="1024" value="220" />
            </p>
            <p>
              <label for="height">
                高度 / Height
                <output id="height-value" for="height">80</output>
              </label>
              <input id="height" name="height" type="range" min="32" max="1024" value="80" />
            </p>
            <p>
              <label for="padding">
                边距 / Padding
                <output id="padding-value" for="padding">8</output>
              </label>
              <input id="padding" name="padding" type="range" min="0" max="26" value="8" />
            </p>
            <p>
              <label for="scale">
                缩放 / Scale
                <output id="scale-value" for="scale">自动 / Auto</output>
              </label>
              <input id="scale" name="scale" type="range" min="0" max="32" value="0" />
            </p>
            <p>
              <label for="character-spacing">
                字符间距 / Spacing
                <output id="character-spacing-value" for="character-spacing">2</output>
              </label>
              <input id="character-spacing" name="characterSpacing" type="range" min="0" max="16" value="2" />
            </p>
            <p>
              <label for="character-jitter">
                字符抖动 / Jitter
                <output id="character-jitter-value" for="character-jitter">0</output>
              </label>
              <input id="character-jitter" name="characterJitter" type="range" min="0" max="4" value="0" />
            </p>
          </fieldset>

          <fieldset>
            <legend>动画与信号 / Animation &amp; Signal</legend>
            <p>
              <label for="frames">
                循环帧数 / Sequence frames
                <output id="frames-value" for="frames">8</output>
              </label>
              <input id="frames" name="frameCount" type="range" min="4" max="32" step="2" value="8" />
            </p>
            <p>
              <label for="grain-size">
                颗粒大小 / Grain size
                <output id="grain-size-value" for="grain-size">2</output>
              </label>
              <input id="grain-size" name="grainSize" type="range" min="1" max="8" value="2" />
            </p>
            <p>
              <label for="signal-strength">
                信号强度 / Signal strength
                <output id="signal-strength-value" for="signal-strength">1</output>
              </label>
              <input id="signal-strength" name="signalStrength" type="range" min="0.25" max="1" step="0.05" value="1" />
            </p>
            <p>
              <label for="signal-spread">
                笔画扩展 / Signal spread
                <output id="signal-spread-value" for="signal-spread">1</output>
              </label>
              <input id="signal-spread" name="signalSpread" type="range" min="0" max="2" value="1" />
            </p>
            <p>
              <label for="signal-quiet-zone">
                信号稳定区 / Quiet zone
                <output id="signal-quiet-zone-value" for="signal-quiet-zone">1</output>
              </label>
              <input id="signal-quiet-zone" name="signalQuietZone" type="range" min="0" max="4" value="1" />
            </p>
            <p>
              <label for="temporal-noise">
                时序噪声 / Temporal noise
                <output id="temporal-noise-value" for="temporal-noise">0.005</output>
              </label>
              <input id="temporal-noise" name="temporalNoiseDensity" type="range" min="0" max="0.5" step="0.001"
                value="0.005" />
            </p>
            <p>
              <label for="snow-refresh">
                雪花刷新率 / Snow refresh rate
                <output id="snow-refresh-value" for="snow-refresh">0.04</output>
              </label>
              <input id="snow-refresh" name="snowRefreshRate" type="range" min="0" max="1" step="0.01" value="0.04" />
            </p>
          </fieldset>

          <fieldset>
            <legend>颜色 / Colors</legend>
            <p>
              <label for="dark-color">暗色 / Dark</label>
              <input id="dark-color" name="darkColor" type="color" value="#0a0d0e" />
            </p>
            <p>
              <label for="light-color">亮色 / Light</label>
              <input id="light-color" name="lightColor" type="color" value="#eef2f3" />
            </p>
          </fieldset>

        </form>
      </section>
    </div>
  </main>
</body>

</html>
